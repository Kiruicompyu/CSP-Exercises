<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyWay - Flight Booking</title>

    <link rel="stylesheet" href="./css/style.css" />
    <!-- <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/> -->
  </head>

  <body>
    <header>
      <div class="container header-container">
        <div class="logo">
          <i class="fas fa-plane"></i>
          <h1>SkyWay</h1>
        </div>

        <nav>
          <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">My Bookings</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="search-box">
        <div class="tabs">
          <button class="active-tab">Round Trip</button>
          <button>One Way</button>
          <button>Multi-City</button>
        </div>

        <form class="form-grid">
          <div class="form-group">
            <label>From</label>
            <select>
              <option>Select city</option>
              <option>New York (JFK)</option>
              <option>Los Angeles (LAX)</option>
              <option>Chicago (ORD)</option>
              <option>Miami (MIA)</option>
            </select>
          </div>

          <div class="form-group">
            <label>To</label>
            <select>
              <option>Select city</option>
              <option>London (LHR)</option>
              <option>Paris (CDG)</option>
              <option>Tokyo (NRT)</option>
              <option>Dubai (DXB)</option>
            </select>
          </div>

          <div class="form-group">
            <label>Departure</label>
            <input type="date" />
          </div>

          <div class="form-group">
            <label>Return</label>
            <input type="date" />
          </div>

          <div class="search-button">
            <button type="submit">Search Flights</button>
          </div>
        </form>
      </div>

      <footer>
        <div class="container footer-grid">
          <div>
            <h3>SkyWay</h3>
            <p>Making air travel simple and affordable for everyone.</p>
          </div>

          <div>
            <h3>Quick Links</h3>
            <ul>
              <li><a href="#">About Us</a></li>
              <li><a href="#">Contact</a></li>
              <li><a href="#">Privacy Policy</a></li>
            </ul>
          </div>

          <div>
            <h3>Contact Us</h3>
            <p><i class="fas fa-envelope"></i> support@skyway.com</p>
            <p><i class="fas fa-phone"></i> +1 (555) 123-4567</p>
          </div>
        </div>

        <div class="copyright">
          <p>© 2023 SkyWay. All rights reserved.</p>
        </div>
      </footer>
    </main>
  </body>
</html>
