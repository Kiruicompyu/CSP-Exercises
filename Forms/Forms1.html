<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Form to submit My Comments</h1>
    <div>
        <form action="" method="post">
            <fieldset id="personalDetails">
                <legend>Personal Details</legend>
                <label for="name">Name:</label>
                <input type="text" name="name" id="name" required autofocus>
                <br>
                <label for="email">Email Address:</label>
                <input type="email" name="email" id="email" required>
                <br>
                <label for="gender">Gender:</label>            
                <input type="radio" name="gender" id="male" value="Male">
                <label for="male">Male</label>
                <input type="radio" name="gender" id="female" value="Female"> 
                <label for="female">Female</label>
                <br>
                <label for="age">Age:</label>
                <select name="age" id="age">
                    <option value="0-18">Under 18</option>
                    <option value="18-30" selected>Under 30</option>
                    <option value="30-60">Under 60</option>
                    <option value="60+">Over 60</option>
                </select>
            </fieldset>
            <fieldset id="Comments">
                <legend>Please Comment Here</legend>
                <label for="comment">Comments:</label>
                <br>
                <textarea name="comment" id="comment" cols="40" rows="5"></textarea>
            </fieldset>
            <input type="submit" value="Submit My Comments">
        </form>
    </div>
</body>
</html>
